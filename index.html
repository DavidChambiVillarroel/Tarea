<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 16px;
    }

    input[type="text"] {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      margin-bottom: 8px;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }

    @media (min-width: 600px) {
      main {
        display: flex;
        gap: 40px;
        align-items: flex-start;
      }
      aside {
        width: 220px;
        flex-shrink: 0;
      }
      section {
        flex: 1;
      }
      table {
        margin-top: 0;
      }
    }
  </style>
</head>
<body>

  <h1>Todo List</h1>

  <main>

    <aside>
      <label for="producto">Descripción:</label>
      <input type="text" id="producto" placeholder="Escribe aquí...">
      <button onclick="agregar()">Añadir</button>
    </aside>

    <section>
      <table>
        <thead>
          <tr>
            <th>Descripción</th>
            <th>Fecha</th>
            <th>Listo</th>
            <th>Eliminar</th>
          </tr>
        </thead>
        <tbody id="lista"></tbody>
      </table>
    </section>

  </main>

  <script>
    window.onload = function() {
      mostrar();
    };

    function agregar() {
      var texto = document.getElementById("producto").value;

      if (texto == "") {
        alert("Escribe algo primero.");
        return;
      }

      var lista = JSON.parse(localStorage.getItem("productos") || "[]");

      var hoy = new Date();
      var fecha = hoy.toLocaleDateString("es-BO");

      lista.push({
        descripcion: texto,
        fecha: fecha,
        listo: false
      });

      localStorage.setItem("productos", JSON.stringify(lista));
      document.getElementById("producto").value = "";
      mostrar();
    }

    function mostrar() {
      var lista = JSON.parse(localStorage.getItem("productos") || "[]");
      var tbody = document.getElementById("lista");
      tbody.innerHTML = "";

      for (var i = 0; i < lista.length; i++) {
        var fila = document.createElement("tr");

        var tdDesc = document.createElement("td");
        tdDesc.textContent = lista[i].descripcion;

        var tdFecha = document.createElement("td");
        tdFecha.textContent = lista[i].fecha;

        var tdCheck = document.createElement("td");
        var check = document.createElement("input");
        check.type = "checkbox";
        check.checked = lista[i].listo;
        check.setAttribute("data-index", i);
        check.onchange = marcar;
        tdCheck.appendChild(check);

        var tdEliminar = document.createElement("td");
        var btnEliminar = document.createElement("button");
        btnEliminar.textContent = "Eliminar";
        btnEliminar.setAttribute("data-index", i);
        btnEliminar.onclick = eliminar;
        tdEliminar.appendChild(btnEliminar);

        fila.appendChild(tdDesc);
        fila.appendChild(tdFecha);
        fila.appendChild(tdCheck);
        fila.appendChild(tdEliminar);

        tbody.appendChild(fila);
      }
    }

    function marcar() {
      var i = this.getAttribute("data-index");
      var lista = JSON.parse(localStorage.getItem("productos") || "[]");
      lista[i].listo = this.checked;
      localStorage.setItem("productos", JSON.stringify(lista));
      mostrar();
    }

    function eliminar() {
      var i = this.getAttribute("data-index");
      var lista = JSON.parse(localStorage.getItem("productos") || "[]");
      lista.splice(i, 1);
      localStorage.setItem("productos", JSON.stringify(lista));
      mostrar();
    }
  </script>

</body>
</html>
